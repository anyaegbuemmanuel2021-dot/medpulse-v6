[build]
  command   = "npm run build"
  publish   = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION  = "10"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# ── Redirects ──────────────────────────────────────────────────────────────
[[redirects]]
  from   = "/home"
  to     = "/"
  status = 301

# ── Headers ────────────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options       = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy       = "strict-origin-when-cross-origin"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
